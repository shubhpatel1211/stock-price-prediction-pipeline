data:
  start_date: "2015-01-01"
  end_date: null
  raw_dir: "data/raw"
  processed_dir: "data/processed"

features:
  target_column: "target"
  lags: [1, 2, 3, 5, 10]
  rolling_windows: [5, 10, 20]

model:
  type: "random_forest"
  params:
    n_estimators: 500
    max_depth: 6
    min_samples_leaf: 5
    random_state: 42
    n_jobs: -1

training:
  test_size: 0.2
  random_state: 42

output:
  model_dir: "models"
  plot_dir: "assets/generated"